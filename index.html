<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Christian Vea | Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#111;color:white;overflow-x:hidden}

body{animation:pageFadeIn 0.5s ease forwards}
@keyframes pageFadeIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
body.fade-out{animation:pageFadeOut 0.35s ease forwards}
@keyframes pageFadeOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(-16px)}
}

nav{width:100%;background:#1a1a1a;padding:20px 8%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:1000}
.logo{color:cyan;font-size:28px;text-decoration:none}
nav ul{display:flex;gap:5px;list-style:none;flex-wrap:wrap}
nav ul li a{display:block;color:white;text-decoration:none;font-size:16px;padding:10px 14px;border-radius:6px;transition:color 0.3s}
nav ul li a:hover,nav ul li a.active{color:cyan}
.page{min-height:calc(100vh - 80px);padding:60px 8%}
.hero{min-height:80vh;display:flex;justify-content:center;align-items:center;gap:60px;flex-wrap:wrap}
.hero-text{flex:1;min-width:300px}
.hero-text h1{font-size:55px;margin-bottom:15px}
.hero-text p{font-size:22px;color:#ccc}
.hero-image{flex:1;display:flex;justify-content:center;min-width:300px}
.hero-image img{width:320px;max-width:100%;border-radius:50%;border:5px solid cyan;object-fit:cover}
.btn{display:inline-block;margin-top:25px;padding:12px 28px;border:none;border-radius:8px;background:cyan;color:black;font-weight:bold;font-size:16px;cursor:pointer;text-decoration:none;transition:transform 0.3s}
.btn:hover{transform:scale(1.05)}
footer{text-align:center;padding:24px 8%;font-size:14px;color:#555;border-top:1px solid #222}
@media(max-width:992px){.hero{gap:40px}.hero-text h1{font-size:45px}}
@media(max-width:768px){nav{flex-direction:column;gap:15px}nav ul{justify-content:center}.hero{text-align:center;flex-direction:column}.hero-text h1{font-size:38px}.hero-text p{font-size:18px}.hero-image img{width:250px}}
@media(max-width:480px){nav{padding:20px}.logo{font-size:22px}nav ul{gap:5px}nav ul li a{font-size:14px;padding:8px 10px}.hero-text h1{font-size:30px}.hero-text p{font-size:16px}}
#particle-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
nav, main, footer { position: relative; z-index: 1; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">PORTFOLIO</a>
  <ul>
    <li><a href="index.html" class="active">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="techstack.html">Tech Stack</a></li>
    <li><a href="certifications.html">Certifications</a></li>
    <li><a href="contacts.html">Contact</a></li>
  </ul>
</nav>

<main class="page">
  <div class="hero">
    <div class="hero-text">
      <h1>Hello, I'm James Christian Vea</h1>
      <p>Aspiring Web Developer &amp; Student</p>
      <a href="about.html" class="btn nav-link">Explore More</a>
    </div>
    <div class="hero-image">
      <img src="pogi.jpeg" alt="James Christian Vea">
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2025 James Christian Vea. All rights reserved.</p>
</footer>

<script>
document.querySelectorAll('a[href]').forEach(function(link) {
  var href = link.getAttribute('href');
  if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
  link.addEventListener('click', function(e) {
    e.preventDefault();
    document.body.classList.add('fade-out');
    setTimeout(function() { window.location.href = href; }, 350);
  });
});
</script>
<script src="background.js"></script>
</body>
</html>
