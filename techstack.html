<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Christian Vea | Tech Stack</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#111;color:white;overflow-x:hidden}

/* ── Page transition ── */
body{animation:pageFadeIn 0.5s ease forwards}
@keyframes pageFadeIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
body.fade-out{animation:pageFadeOut 0.35s ease forwards}
@keyframes pageFadeOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(-16px)}
}

/* ── Skill card stagger ── */
.skill-card{opacity:0;animation:cardIn 0.4s ease forwards}
.skill-card:nth-child(1){animation-delay:0.05s}
.skill-card:nth-child(2){animation-delay:0.10s}
.skill-card:nth-child(3){animation-delay:0.15s}
.skill-card:nth-child(4){animation-delay:0.20s}
.skill-card:nth-child(5){animation-delay:0.25s}
.skill-card:nth-child(6){animation-delay:0.30s}
.skill-card:nth-child(7){animation-delay:0.35s}
.skill-card:nth-child(8){animation-delay:0.40s}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(0.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

nav{width:100%;background:#1a1a1a;padding:20px 8%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:1000}
.logo{color:cyan;font-size:28px;text-decoration:none}
nav ul{display:flex;gap:5px;list-style:none;flex-wrap:wrap}
nav ul li a{display:block;color:white;text-decoration:none;font-size:16px;padding:10px 14px;border-radius:6px;transition:color 0.3s}
nav ul li a:hover,nav ul li a.active{color:cyan}
.page{min-height:calc(100vh - 80px);padding:60px 8%}
.page-content{text-align:center;max-width:900px;margin:0 auto}
.page-content h1{color:cyan;margin-bottom:15px;font-size:45px}
.page-content>p{font-size:18px;color:#aaa;margin-bottom:10px}
.skills-container{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:40px}
.skill-card{background:#1f1f1f;display:flex;flex-direction:column;align-items:center;gap:12px;padding:28px 32px;border-radius:10px;min-width:120px;transition:transform 0.3s}
.skill-card:hover{transform:translateY(-10px)}
.skill-card i{font-size:56px;line-height:1}
.skill-card span{font-size:14px;font-weight:bold;color:#ccc;letter-spacing:0.5px}
footer{text-align:center;padding:24px 8%;font-size:14px;color:#555;border-top:1px solid #222}
@media(max-width:768px){nav{flex-direction:column;gap:15px}nav ul{justify-content:center}.page-content h1{font-size:35px}}
@media(max-width:480px){nav{padding:20px}.logo{font-size:22px}nav ul{gap:5px}nav ul li a{font-size:14px;padding:8px 10px}.page-content h1{font-size:28px}.skill-card{width:100%}.skill-card i{font-size:44px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">PORTFOLIO</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="techstack.html" class="active">Tech Stack</a></li>
    <li><a href="certifications.html">Certifications</a></li>
    <li><a href="contacts.html">Contact</a></li>
  </ul>
</nav>

<main class="page">
  <div class="page-content">
    <h1>My Tech Stack</h1>
    <p>Programming languages and tools I have learned so far.</p>
    <div class="skills-container">
      <div class="skill-card"><i class="devicon-html5-plain colored"></i><span>HTML</span></div>
      <div class="skill-card"><i class="devicon-css3-plain colored"></i><span>CSS</span></div>
      <div class="skill-card"><i class="devicon-javascript-plain colored"></i><span>JavaScript</span></div>
      <div class="skill-card"><i class="devicon-python-plain colored"></i><span>Python</span></div>
      <div class="skill-card"><i class="devicon-cplusplus-plain colored"></i><span>C++</span></div>
      <div class="skill-card"><i class="devicon-c-plain colored"></i><span>C</span></div>
      <div class="skill-card"><i class="devicon-php-plain colored"></i><span>PHP</span></div>
      <div class="skill-card"><i class="devicon-mysql-plain colored"></i><span>MySQL</span></div>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2025 James Christian Vea. All rights reserved.</p>
</footer>

<script>
document.querySelectorAll('a[href]').forEach(function(link) {
  var href = link.getAttribute('href');
  if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
  link.addEventListener('click', function(e) {
    e.preventDefault();
    document.body.classList.add('fade-out');
    setTimeout(function() { window.location.href = href; }, 350);
  });
});
</script>
<script src="background.js"></script>
</body>
</html>
